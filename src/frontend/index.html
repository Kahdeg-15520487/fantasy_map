<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy World Map</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- M10: Skip link for keyboard navigation (WCAG 2.4.1) -->
<a href="#map-container" class="skip-link">Skip to map</a>

<header>
  <button id="btn-back" title="Back to realm" style="display:none">← Back</button>
  <!-- M11: aria-live so screen readers announce title changes -->
  <h1 id="map-title" aria-live="polite">🗺️ Fantasy World</h1>
  <div class="controls" id="layer-toggles"></div>
  <button id="btn-regen" title="Regenerate world">🔄 New Map</button>
</header>

<noscript>
  <div style="padding:2rem;text-align:center;color:#e0e0e0;background:#1a1a2e;">
    <h2>JavaScript Required</h2>
    <p>This application requires JavaScript to render the fantasy world map.</p>
  </div>
</noscript>
<div id="map-container">
  <!-- M8: ARIA role for the SVG map -->
  <svg id="map" role="img" aria-label="Fantasy world map"></svg>
  <!-- M11: aria-live for dynamic legend updates -->
  <div id="legend" aria-live="polite"></div>
  <!-- M8: Tooltip with proper role -->
  <div id="tooltip" role="tooltip"></div>
  <!-- M11: aria-live for loading state -->
  <div id="loading" class="hidden" aria-live="assertive">Loading…</div>
</div>

<!-- #10: SRI hash + crossorigin for supply-chain safety -->
<script
  src="https://d3js.org/d3.v7.min.js"
  integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i"
  crossorigin="anonymous"
></script>
<script type="module" src="app.js"></script>
<script>
  // Bootstrap — #18: theme convention documented inline
  (async function() {
    try {
      // Import the ES module entry point
      const { initWorldMap } = await import('./app.js');
      if (typeof initWorldMap !== 'function') {
        console.error('initWorldMap not exported from app.js');
        // L6: Show error in loading element
        var loadingEl = document.getElementById('loading');
        if (loadingEl) {
          loadingEl.textContent = 'Error: Map module failed to load. Please refresh.';
          loadingEl.classList.remove('hidden');
        }
        return;
      }
      const themeResp = await fetch('realm_theme.json');
      const theme = await themeResp.json();
      await initWorldMap({
        realmSvgUrl: 'realm.svg',
        realmTheme: theme,
        townsDataUrl: 'towns.json',
        onRegen: function() {
          console.log('Regenerate world — implement your generation logic here.');
        },
      });
    } catch (err) {
      console.error('Failed to bootstrap:', err);
      // L6: Show error in loading element
      var loadingEl = document.getElementById('loading');
      if (loadingEl) {
        loadingEl.textContent = 'Failed to initialize. Please refresh.';
        loadingEl.classList.remove('hidden');
      }
    }
  })();
</script>

</body>
</html>
